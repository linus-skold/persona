name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          mkdir -p dist
          cd ..
          cp -r persona Persona
          zip -r "persona/dist/Persona-${{ steps.version.outputs.VERSION }}.zip" Persona \
            --exclude "Persona/.git*" \
            --exclude "Persona/dist/*" \
            --exclude "Persona/.github/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Persona ${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: dist/Persona-${{ steps.version.outputs.VERSION }}.zip
